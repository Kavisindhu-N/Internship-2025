<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Siri</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <script defer src="script.js"></script>
</head>

<body class="bg-primary-subtle  d-flex justify-content-center align-items-center vh-100">

    <div class="card p-4" style="width: 360px; background-color: #ffffff;">

        <h4 class="text-center text-primary mb-3">Siri</h4>

        <div id="chat-box" class="border rounded-3 p-3 mb-3  overflow-auto"
            style="height: 400px; background-color: #f8f9fa;"></div>

        <div class="input-group">
            <input type="text" id="user-input" class="form-control rounded-start-pill"
                placeholder="Ask me something...">
            <button class="btn btn-primary rounded-end-pill" onclick="userQuestion()">Send</button>
        </div>

    </div>
</body>
</html>
