<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script defer src="userdashboardScript.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</head>

<body>
    <div class="container mt-5">
        <h2 id="welcomeMessage" class="mb-4 text-center text-secondary"></h2>

        <!-- Change Employee ID Modal -->
        <div class="modal fade" id="changeEmpIdModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content p-3">
                    <h5 class="text-center mb-3">Change Employee ID</h5>
                    <input type="text" id="newEmpId" class="form-control mb-3" placeholder="Enter new Employee ID" />
                    <button id="saveEmpIdBtn" class="btn btn-primary w-100">Save</button>
                </div>
            </div>
        </div>


        <div class="text-end mb-3">
            <button id="changeEmpIdBtn" class="btn btn-secondary me-2">Change ID</button>
            <button id="logoutButton" class="btn btn-secondary">Logout</button>
        </div>

        <div class="mb-3 d-flex align-items-center gap-3">
            <h4 class="mb-0">Users</h4>
            <input type="text" id="searchInput" class="form-control flex-grow-1" placeholder="Search by name or email">
        </div>


        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Employee ID</th>
                    <th>Name</th>
                    <th>Email</th>
                </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
        </table>

        <nav>
            <ul class="pagination justify-content-center" id="pagination"></ul>
        </nav>
    </div>
</body>

</html>
