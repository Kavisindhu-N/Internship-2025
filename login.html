<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login & Signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script defer src="loginScript.js"></script>
</head>

<body class="bg-light">

    <div class="container d-flex align-items-center justify-content-center min-vh-100">

        <!-- Login Form -->
        <div id="loginForm" class="card p-4 shadow-sm" style="width: 100%; max-width: 420px;">
            <h4 class="text-center text-primary fw-bold mb-1">👤 Welcome Back</h4>
            <p class="text-center text-muted mb-4 small">Sign in to your account</p>

            <form class="d-flex gap-3 flex-column">
                <input type="email" class="form-control" id="loginEmail" placeholder="Enter your email" required />
                <input type="password" class="form-control" id="loginPassword" placeholder="Enter your password"
                    required />
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <a href="#" class="small" onclick="showForm('forgot')">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="loginButton">Login</button>
            </form>

            <p class="text-center mt-3 small">Don't have an account? <a href="register.html">Sign up
                    here</a></p>
        </div>




        <!-- Forgot Password -->
        <div id="forgotForm" class="card p-4 shadow-sm d-none" style="width: 100%; max-width: 420px;">
            <h4 class="text-center text-warning fw-bold mb-1">🔐 Forgot Password</h4>
            <p class="text-center text-muted mb-4 small">Reset your credentials</p>
            <form class="d-flex gap-3 flex-column">
                <input type="email" class="form-control" id="forgotEmail" placeholder="Enter your email" required />
                <input type="password" class="form-control" id="password" placeholder="Enter new password" required />
                <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm new password"
                    required />
                <button type="submit" class="btn btn-warning w-100" id="changePassword">Change Password</button>
            </form>
            <p class="text-center mt-3 small"><a href="#" onclick="showForm('login')">Back to Login</a></p>
        </div>
    </div>

</body>

</html>
