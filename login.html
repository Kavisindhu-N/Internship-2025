<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login & Signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <script defer src="loginScript.js"></script>
</head>

<body>

    <div class="container mt-5">

        <!-- Login Form -->
        <div id="loginForm" class="card mx-auto p-4 shadow" style="max-width: 400px;">
            <h4 class="mb-3 text-center text-primary">Login</h4>
            <form class="d-flex flex-column gap-3">
                <input type="email" class="form-control" id="loginEmail" placeholder="Enter email">
                <input type="password" class="form-control" id="loginPassword" placeholder="Enter password">
                <a href="#" onclick="showForm('forgot')" class="small">Forgot Password?</a>
                <button type="submit" class="btn btn-primary w-100" id="loginButton">Login</button>
            </form>
            <span class="small mt-3">Don't have an account? <a href="#" onclick="showForm('signup')">Sign up</a></span>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" class="card mx-auto p-4 shadow d-none" style="max-width: 400px;">
            <h4 class="mb-3 text-center text-success">Sign Up</h4>
            <form class="d-flex flex-column gap-3 ">
                <input type="text" class="form-control" id="signupName" placeholder="Username">
                <input type="email" class="form-control" id="signupEmail" placeholder="Email">
                <input type="password" class="form-control" id="signupPassword" placeholder="Password">
                <input type="password" class="form-control" id="signupConfirmPassword" placeholder="Confirm Password">
                <button type="submit" class="btn btn-success w-100" id="signupButton">Sign Up</button>
            </form>
            <span class="small mt-3">Already have an account? <a href="#" onclick="showForm('login')">Login
                    here</a></span>
        </div>

        <!-- Forgot Password Form -->
        <div id="forgotForm" class="card mx-auto p-4 shadow d-none" style="max-width: 400px;">
            <h4 class="mb-3 text-center text-warning">Forgot Password</h4>
            <form class="d-flex flex-column gap-3">
                <input type="email" class="form-control" id="forgotEmail" placeholder="email">
                <input type="password" class="form-control" placeholder="Password" id="password">
                <input type="password" class="form-control" placeholder="Confirm Password" id="confirmPassword">
                <button type="submit" class="btn btn-warning w-100" id="changePassword">Change Password</button>
            </form>
            <div class="text-center mt-3">
                <span class="small"><a href="#" onclick="showForm('login')">Back to Login</a></span>
            </div>
        </div>
    </div>

</body>

</html>
